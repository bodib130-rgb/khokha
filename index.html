<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>💗</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial;
      background: radial-gradient(900px 500px at 20% 10%, #ff4d8d33, transparent 60%),
                  radial-gradient(900px 500px at 80% 20%, #ffd27a22, transparent 60%),
                  linear-gradient(135deg,#0b1020,#1a1035);
      overflow:hidden; color:#fff;
    }
    .card{
      width:min(520px,92vw); text-align:center;
      padding:24px 18px; border-radius:22px;
      background:#0f1630cc; border:1px solid #ffffff22;
      box-shadow:0 22px 70px #00000066; backdrop-filter: blur(10px);
    }
    .btn{
      margin-top:16px; width:110px; height:110px; border:none; cursor:pointer;
      border-radius:28px;
      background: linear-gradient(135deg,#ff4d8d,#ff79b0);
      box-shadow:0 18px 50px #ff4d8d55;
      font-size:52px;
      transition:.18s;
    }
    .btn:active{transform:scale(.95)}
    .msg{
      display:none; margin-top:18px;
      font-weight:900;
      font-size: clamp(44px, 7vw, 82px);
      color:#ffd27a;
      text-shadow:0 18px 60px #ff4d8d66;
    }
    .msg.show{display:block; animation: pop .25s ease both;}
    @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}

    .sub{margin:8px 0 0; color:#cfd3ff; font-size:14px}
    .heartBig{display:block; font-size: clamp(36px, 5vw, 54px); margin-top:6px}

    /* flying hearts */
    .h{
      position:fixed; left:50%; top:50%;
      transform: translate(-50%,-50%);
      font-size:18px;
      animation: fly 1.8s ease-out forwards;
      pointer-events:none;
      text-shadow:0 10px 22px rgba(255,77,141,.35);
    }
    @keyframes fly{
      0%{opacity:0; transform:translate(calc(-50% + var(--x0)), calc(-50% + var(--y0))) scale(.7)}
      12%{opacity:1}
      100%{opacity:0; transform:translate(calc(-50% + var(--x1)), calc(-50% + var(--y1))) scale(1.35)}
    }
  </style>
</head>
<body>

  <div class="card">
    <div style="font-size:20px; font-weight:700;">اضغط على القلب 💗</div>
    <div class="sub">هتظهر رسالة وقلوب كتير حواليها ✨</div>

    <button class="btn" id="btn">💗</button>

    <div class="msg" id="msg">
      بحبك يا خوخة عيني
      <span class="heartBig">💖</span>
    </div>
  </div>

  <script>
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");

    const hearts = ["💗","💖","❤️","💕","💘","💝"];

    function r(min,max){ return Math.random()*(max-min)+min; }

    function spawnAround(el, n=26){
      const b = el.getBoundingClientRect();
      const cx = b.left + b.width/2;
      const cy = b.top  + b.height/2;

      for(let i=0;i<n;i++){
        const h = document.createElement("div");
        h.className = "h";
        h.textContent = hearts[(Math.random()*hearts.length)|0];

        h.style.left = cx + "px";
        h.style.top  = cy + "px";

        h.style.setProperty("--x0", r(-20,20) + "px");
        h.style.setProperty("--y0", r(-15,15) + "px");

        const ang = r(0, Math.PI*2);
        const dist = r(120, 280);
        h.style.setProperty("--x1", (Math.cos(ang)*dist) + "px");
        h.style.setProperty("--y1", (Math.sin(ang)*dist - r(40,120)) + "px");

        document.body.appendChild(h);
        setTimeout(()=>h.remove(), 1900);
      }
    }

    btn.addEventListener("click", () => {
      msg.classList.add("show");
      spawnAround(btn, 30);
      setTimeout(()=>spawnAround(msg, 40), 120); // حوالي الرسالة
    });

    // كليك على الرسالة يزود القلوب
    msg.addEventListener("click", () => spawnAround(msg, 50));
  </script>
</body>
</html>
