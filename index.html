<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>💗</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0; height:100vh; overflow:hidden;
    display:grid; place-items:center;
    font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial;
    color:#fff;
    background: radial-gradient(900px 600px at 20% 10%, rgba(0,255,170,.12), transparent 60%),
                radial-gradient(900px 600px at 80% 20%, rgba(255,0,200,.12), transparent 60%),
                linear-gradient(135deg,#050611,#0b1030);
  }

  .frame{
    width:min(640px,92vw);
    padding:28px 18px;
    border-radius:26px;
    text-align:center;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(10,12,28,.55);
    backdrop-filter: blur(10px);
    box-shadow: 0 30px 110px rgba(0,0,0,.55);
    position:relative;
  }

  .badge{
    display:inline-block;
    padding:8px 12px;
    border-radius:999px;
    font-size:13px;
    letter-spacing:.3px;
    border:1px solid rgba(255,255,255,.14);
    color:rgba(210,255,245,.95);
    background: linear-gradient(90deg, rgba(0,255,170,.12), rgba(255,0,200,.12));
  }

  .btn{
    margin:18px auto 0;
    width:120px; height:120px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.16);
    cursor:pointer;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.35), transparent 45%),
                linear-gradient(135deg, #00ffb3, #ff3bd4);
    box-shadow: 0 0 30px rgba(0,255,179,.35),
                0 0 45px rgba(255,59,212,.28),
                0 20px 60px rgba(0,0,0,.55);
    transition:.18s;
    display:grid; place-items:center;
    position:relative;
    outline:none;
  }
  .btn:hover{ transform: translateY(-2px) scale(1.02); }
  .btn:active{ transform: scale(.95); }
  .btn .ico{
    font-size:54px;
    filter: drop-shadow(0 14px 22px rgba(0,0,0,.35));
  }

  .msg{
    display:none;
    margin-top:18px;
    padding:16px 14px;
    border-radius:22px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(0,0,0,.16);
  }
  .msg.show{ display:block; animation: pop .25s ease both; }
  @keyframes pop{
    from{ opacity:0; transform: translateY(10px) scale(.98); }
    to{ opacity:1; transform:none; }
  }

  .text{
    font-weight:1000;
    font-size: clamp(46px, 7.5vw, 92px);
    line-height:1.08;
    background: linear-gradient(90deg, #00ffb3, #ffd27a, #ff3bd4);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow: 0 18px 70px rgba(255,59,212,.25);
  }
  .bigHeart{
    margin-top:10px;
    font-size: clamp(34px, 5vw, 54px);
    animation: beat .9s ease-in-out infinite;
  }
  @keyframes beat{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.16)} }

  /* flying hearts */
  .h{
    position:fixed;
    left:50%; top:50%;
    transform: translate(-50%,-50%);
    font-size:18px;
    pointer-events:none;
    opacity:0;
    animation: fly 1.65s ease-out forwards;
    filter: drop-shadow(0 14px 22px rgba(255,59,212,.18));
  }
  @keyframes fly{
    0%{ opacity:0; transform:translate(calc(-50% + var(--x0)), calc(-50% + var(--y0))) scale(.7); }
    12%{ opacity:1; }
    100%{ opacity:0; transform:translate(calc(-50% + var(--x1)), calc(-50% + var(--y1))) scale(1.35); }
  }

  .hint{ margin-top:10px; font-size:13px; color: rgba(207,211,255,.9); }
</style>
</head>
<body>

  <div class="frame">
    <div class="badge">NEON LOVE ✨</div>
    <div class="hint">اضغط على القلب</div>

    <button class="btn" id="btn" aria-label="قلب">
      <span class="ico">💗</span>
    </button>

    <div class="msg" id="msg">
      <div class="text" id="text">بحبك يا خوخة عيني</div>
      <div class="bigHeart">💖</div>
    </div>
  </div>

<script>
  const btn = document.getElementById("btn");
  const msg = document.getElementById("msg");
  const text = document.getElementById("text");
  const hearts = ["💗","💖","❤️","💕","💘","💝"];

  const r = (a,b)=>Math.random()*(b-a)+a;

  function burst(el, n){
    const b = el.getBoundingClientRect();
    const cx = b.left + b.width/2;
    const cy = b.top  + b.height/2;

    for(let i=0;i<n;i++){
      const h = document.createElement("div");
      h.className = "h";
      h.textContent = hearts[(Math.random()*hearts.length)|0];

      h.style.left = cx + "px";
      h.style.top  = cy + "px";
      h.style.setProperty("--x0", r(-18,18) + "px");
      h.style.setProperty("--y0", r(-14,14) + "px");

      const ang = r(0, Math.PI*2);
      const dist = r(150, 340);
      h.style.setProperty("--x1", (Math.cos(ang)*dist) + "px");
      h.style.setProperty("--y1", (Math.sin(ang)*dist - r(40,130)) + "px");

      document.body.appendChild(h);
      setTimeout(()=>h.remove(), 1700);
    }
  }

  btn.addEventListener("click", () => {
    msg.classList.add("show");
    burst(btn, 26);
    setTimeout(()=>burst(text, 42), 120);
  });

  text.addEventListener("click", ()=> burst(text, 55));
</script>
</body>
</html>
