<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>💖</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial;
      overflow:hidden; color:#fff;
      background:
        radial-gradient(700px 420px at 20% 15%, rgba(255,77,141,.25), transparent 60%),
        radial-gradient(700px 420px at 80% 20%, rgba(255,210,122,.18), transparent 60%),
        linear-gradient(135deg,#070b18,#1a1035);
    }
    .box{
      width:min(560px,92vw);
      padding:26px 18px;
      border-radius:24px;
      text-align:center;
      background:rgba(10,16,36,.68);
      border:1px solid rgba(255,255,255,.16);
      box-shadow:0 22px 80px rgba(0,0,0,.55);
      backdrop-filter: blur(10px);
    }
    .top{
      font-size:20px; font-weight:800; letter-spacing:.2px;
    }
    .hint{ margin-top:8px; font-size:14px; color:rgba(207,211,255,.92); }

    /* heart button */
    .heartBtn{
      margin:18px auto 0;
      width:120px; height:120px;
      border:none; cursor:pointer;
      border-radius:36px;
      background:linear-gradient(135deg,#ff4d8d,#ff79b0);
      box-shadow:0 16px 50px rgba(255,77,141,.45);
      display:grid; place-items:center;
      transition:.18s;
      position:relative;
    }
    .heartBtn:hover{ transform:translateY(-2px) scale(1.02); }
    .heartBtn:active{ transform:scale(.95); }
    .heartBtn span{ font-size:52px; filter: drop-shadow(0 12px 22px rgba(0,0,0,.25)); }

    /* big message */
    .msg{
      display:none;
      margin-top:18px;
      padding:16px 14px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.18);
    }
    .msg.show{ display:block; animation: pop .25s ease both; }
    @keyframes pop{ from{opacity:0; transform:translateY(10px) scale(.98)} to{opacity:1; transform:none} }

    .text{
      font-weight:1000;
      font-size: clamp(46px, 7.5vw, 92px);
      line-height:1.08;
      color:#ffd27a;
      text-shadow:0 18px 60px rgba(255,77,141,.45);
    }
    .bigHeart{
      margin-top:8px;
      font-size: clamp(34px, 5vw, 54px);
      animation: beat .9s ease-in-out infinite;
    }
    @keyframes beat{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }

    /* flying hearts */
    .h{
      position:fixed;
      left:50%; top:50%;
      transform: translate(-50%,-50%);
      font-size:18px;
      pointer-events:none;
      opacity:0;
      animation: fly 1.7s ease-out forwards;
      filter: drop-shadow(0 12px 20px rgba(255,77,141,.25));
    }
    @keyframes fly{
      0%{ opacity:0; transform:translate(calc(-50% + var(--x0)), calc(-50% + var(--y0))) scale(.7); }
      12%{ opacity:1; }
      100%{ opacity:0; transform:translate(calc(-50% + var(--x1)), calc(-50% + var(--y1))) scale(1.35); }
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="top">هدية صغيرة 💗</div>
    <div class="hint">اضغط على القلب</div>

    <button class="heartBtn" id="btn" aria-label="قلب">
      <span>💗</span>
    </button>

    <div class="msg" id="msg">
      <div class="text" id="text">بحبك يا خوخة عيني</div>
      <div class="bigHeart">💖</div>
    </div>
  </div>

  <script>
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");
    const text = document.getElementById("text");
    const hearts = ["💗","💖","❤️","💕","💘","💝"];

    const r = (a,b)=>Math.random()*(b-a)+a;

    function burst(el, n){
      const b = el.getBoundingClientRect();
      const cx = b.left + b.width/2;
      const cy = b.top  + b.height/2;

      for(let i=0;i<n;i++){
        const h = document.createElement("div");
        h.className = "h";
        h.textContent = hearts[(Math.random()*hearts.length)|0];

        h.style.left = cx + "px";
        h.style.top  = cy + "px";
        h.style.setProperty("--x0", r(-18,18) + "px");
        h.style.setProperty("--y0", r(-14,14) + "px");

        const ang = r(0, Math.PI*2);
        const dist = r(140, 320);
        h.style.setProperty("--x1", (Math.cos(ang)*dist) + "px");
        h.style.setProperty("--y1", (Math.sin(ang)*dist - r(40,120)) + "px");

        document.body.appendChild(h);
        setTimeout(()=>h.remove(), 1800);
      }
    }

    btn.addEventListener("click", () => {
      msg.classList.add("show");
      burst(btn, 28);
      setTimeout(()=>burst(text, 40), 120);
    });

    text.addEventListener("click", ()=> burst(text, 55));
  </script>
</body>
</html>
